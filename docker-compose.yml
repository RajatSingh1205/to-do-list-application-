app:
  build: .
  container_name: todo-app
  ports:
    - "8082:8080" # Mapping host 8082 to container 8080 (default Spring port)
  depends_on:
    mysql:
      condition: service_healthy
      environment:
        # Change the URL to PostgreSQL format
        - SPRING_DATASOURCE_URL=jdbc:postgresql://<RENDER_INTERNAL_HOSTNAME>:5432/<DATABASE_NAME>
        - SPRING_DATASOURCE_USERNAME=<RENDER_USER>
        - SPRING_DATASOURCE_PASSWORD=<RENDER_PASSWORD>
        # You can also add this to ensure Hibernate uses the right dialect
        - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect